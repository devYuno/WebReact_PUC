name: CI React

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Instalar dependências
        run: npm install
        working-directory: ./web-app

      - name: Rodar testes
        run: npm test 
        working-directory: ./web-app

      - name: Rodar build
        run: npm run build
        working-directory: ./web-app

      - name: Discord Alert (Success)
        if: success()
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.WEBHOOK_DISCORD }}
          raw-data: |
            {
              "embeds": [
                {
                  "title": "🟢 Build Success",
                  "description": "All tests passed and build completed",
                  "color": 3066993,
                  "fields": [
                    {
                      "name": "Repository",
                      "value": "${{ github.repository }}"
                    },
                    {
                      "name": "Branch",
                      "value": "${{ github.ref_name }}"
                    },
                    {
                      "name": "Node Version",
                      "value": "${{ matrix.node-version }}"
                    }
                  ]
                }
              ]
            }

      - name: Discord Alert (Failure)
        if: failure()
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.WEBHOOK_DISCORD }}
          raw-data: |
            {
              "embeds": [
                {
                  "title": "🔴 Build Failed",
                  "description": "Tests or build failed",
                  "color": 15158332,
                  "fields": [
                    {
                      "name": "Repository",
                      "value": "${{ github.repository }}"
                    },
                    {
                      "name": "Branch",
                      "value": "${{ github.ref_name }}"
                    },
                    {
                      "name": "Node Version",
                      "value": "${{ matrix.node-version }}"
                    },
                    {
                      "name": "Logs",
                      "value": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }