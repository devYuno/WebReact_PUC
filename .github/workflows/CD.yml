name: CD React (Deploy Pages)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Instalar dependências
        run: npm install
        working-directory: ./web-app

      - name: Build
        run: npm run build
        working-directory: ./web-app

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web-app/build

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4